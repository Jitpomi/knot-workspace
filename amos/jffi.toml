[package]
name = "amos"
version = "0.1.0"

[platforms]
enabled = [
    "ios",
    "macos",
]

[platforms.ios]
deployment_target = "16.0"
bundle_id = "com.example.amos"

[platforms.android]
min_sdk = 26
package = "com.example.amos"
obfuscate = false
shrink_resources = false

[platforms.macos]
deployment_target = "13.0"

[platforms.windows]
min_version = "10.0.19041.0"

[platforms.linux]
gtk_version = "4.0"

[platforms.web]
target = "es2020"
port = 5173
host = false
https = false
open = false
cors = true
title = "Amos"
description = "A cross-platform app built with JFFI"
lang = "en"
